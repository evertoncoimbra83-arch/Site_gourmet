<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltamos em breve — Gourmet Saudável</title>
  <link rel="icon" href="/uploads/favicon.ico?v=7" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #059669;
      --green-light: #d1fae5;
      --orange: #E8670A;
      --bg: #f0fdf4;
      --text: #0f172a;
      --muted: #64748b;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Background decorativo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(5,150,105,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(232,103,10,0.05) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: white;
      border: 1px solid rgba(5,150,105,0.15);
      border-radius: 2.5rem;
      padding: 3.5rem 3rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 4px 6px -1px rgba(0,0,0,0.04),
        0 20px 60px -10px rgba(5,150,105,0.08);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Ícone animado */
    .icon-wrap {
      width: 80px;
      height: 80px;
      background: var(--green-light);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(5,150,105,0.2); }
      50%       { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(5,150,105,0); }
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      stroke: var(--green);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-light);
      color: var(--green);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      color: var(--text);
    }

    h1 span { color: var(--green); }

    p {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2rem;
      max-width: 320px;
      margin-inline: auto;
    }

    /* Progress bar */
    .progress-wrap {
      background: #f1f5f9;
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), #34d399);
      border-radius: 100px;
      animation: progress 8s ease-in-out infinite;
    }

    @keyframes progress {
      0%   { width: 0%; }
      40%  { width: 65%; }
      70%  { width: 80%; }
      90%  { width: 88%; }
      100% { width: 88%; }
    }

    .progress-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    /* Botão refresh */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--text);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      width: 100%;
    }

    .btn:hover  { background: var(--green); }
    .btn:active { transform: scale(0.97); }

    .btn svg {
      width: 14px;
      height: 14px;
      stroke: white;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Footer */
    .footer {
      margin-top: 2.5rem;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #cbd5e1;
    }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.5rem; border-radius: 2rem; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="icon-wrap">
      <!-- Ícone de ferramenta/manutenção -->
      <svg viewBox="0 0 24 24">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <div class="badge">
      <div class="badge-dot"></div>
      Manutenção em andamento
    </div>

    <h1>Voltamos em <span>breve!</span></h1>

    <p>
      Estamos atualizando o sistema para trazer uma experiência ainda melhor. Seus dados estão seguros e seus pedidos não foram afetados.
    </p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <p class="progress-label">Restaurando serviços...</p>

    <button class="btn" onclick="location.reload()">
      <svg viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
      Verificar novamente
    </button>

    <div class="footer">Gourmet Saudável &mdash; Sistema protegido</div>
  </div>

  <script>
    // Tenta recarregar automaticamente a cada 30 segundos
    // Quando o servidor voltar, o usuário verá o site normalmente
    setTimeout(() => location.reload(), 30000);
  </script>
</body>
</html>
